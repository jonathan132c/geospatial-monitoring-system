services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geospatial_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      SNAPSHOT_PATH: /app/data/generated/demo-snapshot.json
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/geospatial_monitoring
      WORKER_LOOP: 'true'
      INGESTION_INTERVAL_MS: 300000
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: 3000
      SNAPSHOT_PATH: /app/data/generated/demo-snapshot.json
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: ''
    depends_on:
      - worker
    ports:
      - '3000:3000'
    volumes:
      - ./:/app

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: http://localhost:3000
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      - api
    ports:
      - '4173:4173'

volumes:
  postgres-data:
